name: pipeline

on:
  schedule:
    # Weekly, Mondays at 07:00 UTC. Chosen so a human has time during European
    # business hours to review the resulting PR before the US wakes up.
    - cron: "0 7 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "pipeline/**"
      - ".github/workflows/pipeline.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt pytest

      - name: Run pipeline tests
        run: python -m pytest pipeline/tests -q

      - name: Run pipeline
        env:
          CRUNCHBASE_API_KEY: ${{ secrets.CRUNCHBASE_API_KEY }}
          COMTRADE_API_KEY: ${{ secrets.COMTRADE_API_KEY }}
        run: python -m pipeline.run

      - name: Open PR with data changes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: pipeline/weekly-refresh
          commit-message: "chore(pipeline): weekly data refresh"
          title: "Weekly data refresh"
          body: |
            Automated refresh from the Phase 3 pipeline.

            - Regenerates `public/data/*.geojson` and
              `public/data/parquet/*.parquet`
            - Re-stamps `provenance` on every feature
            - Runs `pipeline/tests` before emitting

            Close without merging if the diff looks unsafe.
          add-paths: |
            public/data/**
