server {
    listen 80;
    server_name observe-ai.samantafluture.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name observe-ai.samantafluture.com;

    ssl_certificate /etc/letsencrypt/live/observe-ai.samantafluture.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/observe-ai.samantafluture.com/privkey.pem;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        root /usr/share/nginx/observe-ai;
        index index.html;
        try_files $uri $uri/ /index.html;
        gzip_static on;
    }

    location ~* \.(css|js|json|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|wasm|parquet|geojson)$ {
        root /usr/share/nginx/observe-ai;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
